// тХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХР TRON SEND тХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХР
async function sendTRON(privateKeyHex, toAddress, amountTRX) {
  // Use TronGrid API to send TRX
  const privateKey = privateKeyHex.startsWith('0x') ? privateKeyHex.slice(2) : privateKeyHex;
  // Get account info to get address
  const fromAddr = await getTRONAddress(privateKey);
  // Create transaction via TronGrid
  const createRes = await fetch('https://api.trongrid.io/wallet/createtransaction', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      to_address: toAddress,
      owner_address: fromAddr,
      amount: Math.floor(parseFloat(amountTRX) * 1e6)
    })
  });
  const txData = await createRes.json();
  if (txData.Error) throw new Error(txData.Error);
  // Sign transaction
  const signRes = await fetch('https://api.trongrid.io/wallet/gettransactionsign', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ transaction: txData, privateKey: privateKey })
  });
  const signedTx = await signRes.json();
  // Broadcast
  const broadcastRes = await fetch('https://api.trongrid.io/wallet/broadcasttransaction', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(signedTx)
  });
  const result = await broadcastRes.json();
  if (!result.result) throw new Error(result.message || 'Broadcast failed');
  return result;
}

async function getTRONAddress(privateKeyHex) {
  // Derive TRON address from private key using ethers
  const wallet = new ethers.Wallet('0x' + privateKeyHex);
  const ethAddr = wallet.address;
  // Convert ETH address to TRON base58 format via TronGrid
  const r = await fetch(`https://api.trongrid.io/v1/accounts/${ethAddr}`);
  const d = await r.json();
  if (d?.data?.[0]?.address) return d.data[0].address;
  // If not found, convert manually - use hex address
  return ethAddr;
}

const tonweb=new TonWeb(new TonWeb.HttpProvider('https://toncenter.com/api/v2/jsonRPC'));
const WDS=['abandon','ability','able','about','above','absent','absorb','abstract','absurd','abuse','access','accident','account','accuse','achieve','acid','acoustic','acquire','across','act','action','actor','actual','adapt','add','addict','address','adjust','admit','adult','advance','advice','aerobic','afford','afraid','again','agent','agree','ahead','aim','air','airport','aisle','alarm','album','alert','alien','alley','allow','almost','alone','alpha','already','also','alter','always','amateur','amazing','among','amount','amused','analyst','anchor','ancient','anger','angle','angry','animal','ankle','announce','annual','another','answer','antenna','antique','anxiety','apart','april','arch','area','arena','argue','arm','armor','army','around','arrange','arrest','arrive','arrow','art','artist','artwork','ask','aspect','assault','asset','assist','assume','asthma','athlete','atom','attack','attend','attitude','attract','auction','audit','august','aunt','author','auto','autumn','average','avocado','avoid','awake','aware','away','awesome','awful','awkward','axis'];
const s2m=s=>{const w=[];for(let i=0;i<24;i++){const x=((s[i*4%32]<<4)|(s[(i*3+1)%32]&0xf))%WDS.length;w.push(WDS[Math.abs(x)]);}return w;};
async function mkTON(){const kp=TonWeb.utils.nacl.sign.keyPair();const seed=kp.secretKey.slice(0,32);const WC=tonweb.wallet.all['v4R2'];const w=new WC(tonweb.provider,{publicKey:kp.publicKey,wc:0});const a=await w.getAddress();return{address:a.toString(true,true,true),addressUQ:a.toString(true,true,false),publicKey:TonWeb.utils.bytesToHex(kp.publicKey),privateKey:TonWeb.utils.bytesToHex(seed),mnemonic:s2m(seed),type:'TON v4R2',walletType:'TON'};}
async function importTON(raw){raw=raw.trim().replace(/^0x/,'');if(raw.length===128)raw=raw.slice(0,64);if(raw.length!==64)throw new Error(`64 hex chars required. Got: ${raw.length}`);if(!/^[0-9a-fA-F]+$/.test(raw))throw new Error('Invalid hex');const seed=TonWeb.utils.hexToBytes(raw);const kp=TonWeb.utils.nacl.sign.keyPair.fromSeed(seed);const WC=tonweb.wallet.all['v4R2'];const w=new WC(tonweb.provider,{publicKey:kp.publicKey,wc:0});const a=await w.getAddress();return{address:a.toString(true,true,true),addressUQ:a.toString(true,true,false),publicKey:TonWeb.utils.bytesToHex(kp.publicKey),privateKey:raw,mnemonic:s2m(seed),type:'TON v4R2',walletType:'TON'};}
async function sendTON(wd,to,amt,memo){const seed=TonWeb.utils.hexToBytes(wd.privateKey);const kp=TonWeb.utils.nacl.sign.keyPair.fromSeed(seed);const WC=tonweb.wallet.all['v4R2'];const wallet=new WC(tonweb.provider,{publicKey:kp.publicKey,wc:0});let seqno=0;try{seqno=await wallet.methods.seqno().call()||0;}catch{}return await wallet.methods.transfer({secretKey:kp.secretKey,toAddress:to.trim(),amount:TonWeb.utils.toNano(String(parseFloat(amt).toFixed(9))),seqno,payload:memo||'',sendMode:3}).send();}
function mkEVM(){const w=ethers.Wallet.createRandom();return{address:w.address,privateKey:w.privateKey.replace(/^0x/,''),mnemonic:w.mnemonic.phrase.split(' '),publicKey:w.publicKey,type:'EVM MetaMask',walletType:'EVM'};}
function importEVM(raw){raw=raw.trim();const hex=raw.replace(/^0x/,'');if(hex.length===64&&/^[0-9a-fA-F]+$/.test(hex)){const w=new ethers.Wallet('0x'+hex);return{address:w.address,privateKey:hex,mnemonic:[],publicKey:w.publicKey,type:'EVM MetaMask',walletType:'EVM'};}if(raw.split(/\s+/).length>=12){const w=ethers.Wallet.fromMnemonic(raw);return{address:w.address,privateKey:w.privateKey.replace(/^0x/,''),mnemonic:w.mnemonic.phrase.split(' '),publicKey:w.publicKey,type:'EVM MetaMask',walletType:'EVM'};}throw new Error('Invalid: 64-char hex or 12/24 word mnemonic');}
async function sendEVM(wd,to,amt,net){const provider=new ethers.providers.JsonRpcProvider(net.rpc);const wallet=new ethers.Wallet('0x'+wd.privateKey,provider);return await wallet.sendTransaction({to:to.trim(),value:ethers.utils.parseEther(String(amt))});}

// тХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХР SEND MODAL тХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХР
function SendModal({wallet,net,onClose,onDone}){
  const isTON=wallet.walletType==='TON';const isTRON=net?.isTRON;
  const MIN=isTON?0.0001:isTRON?1:0.00001;
  const SYM=isTON?'TON':net?.sym||'ETH';
  const FEE=isTON?'~0.005 TON':net?.fee||'~gas fee';
  const [to,setTo]=useState('');const [amt,setAmt]=useState('');const [memo,setMemo]=useState('');const [step,setStep]=useState('form');const [loading,setLoading]=useState(false);const [err,setErr]=useState('');
  const grad=isTON?'from-ton-700 to-ton-500':isTRON?'from-tron-600 to-tron-400':'from-meta-700 to-orange-600';
  const review=()=>{if(!to.trim()){setErr('Recipient address ржжрж┐ржи');return;}if(!amt||parseFloat(amt)<MIN){setErr(`Minimum ${MIN} ${SYM}`);return;}setErr('');setStep('confirm');};
  const send=async()=>{setLoading(true);setErr('');try{if(isTON)await sendTON(wallet,to,parseFloat(amt),memo);else if(isTRON)await sendTRON(wallet.privateKey,to.trim(),parseFloat(amt));else await sendEVM(wallet,to,parseFloat(amt),net);setStep('ok');onDone&&onDone();}catch(e){setErr(e.message||'Failed');setStep('err');}setLoading(false);};
  return <Modal onClose={onClose} title={`Send ${SYM}`} icon="ЁЯТ╕" grad={grad}>
    {step==='form'&&<div className="space-y-4">
      <div><label className="text-xs text-slate-500 mb-1.5 block">From</label><div className="glass border border-white/10 rounded-xl px-4 py-2.5 flex items-center justify-between gap-2"><span className="mono text-xs text-ton-400 truncate">{short(wallet.address)}</span><CpBtn text={wallet.address} sm/></div></div>
      {!isTON&&net&&<div><label className="text-xs text-slate-500 mb-1.5 block">Network</label><div className="glass border border-white/10 rounded-xl px-4 py-2.5 flex items-center gap-2"><span style={{color:net.color}}>{net.icon}</span><span className="text-sm font-medium">{net.name}</span><span className="text-xs text-slate-600 ml-auto bg-white/5 px-2 py-0.5 rounded-full">{net.fee}</span></div></div>}
      <div><label className="text-xs text-slate-500 mb-1.5 block">To Address</label><input value={to} onChange={e=>setTo(e.target.value)} placeholder={isTON?'EQ... or UQ...':isTRON?'T... TRON address':'0x... address'} className="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-sm mono text-slate-200 placeholder-slate-600 focus:border-ton-500 transition-colors"/></div>
      <div>
        <label className="text-xs text-slate-500 mb-1.5 block">Amount тАФ Min: {MIN} {SYM}</label>
        <div className="relative"><input value={amt} onChange={e=>setAmt(e.target.value)} type="number" step="any" placeholder={String(MIN)} className="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-sm text-slate-200 placeholder-slate-600 focus:border-ton-500 transition-colors pr-16"/><span className="absolute right-3 top-1/2 -translate-y-1/2 text-xs text-slate-500 font-medium">{SYM}</span></div>
        <div className="flex gap-1.5 mt-2 flex-wrap">{['0.001','0.01','0.1','1','5','10'].map(v=><button key={v} onClick={()=>setAmt(v)} className="text-xs bg-white/5 hover:bg-white/10 text-slate-400 px-2 py-1 rounded-lg border border-white/10">{v}</button>)}</div>
      </div>
      {isTON&&<div><label className="text-xs text-slate-500 mb-1.5 block">Memo (optional)</label><input value={memo} onChange={e=>setMemo(e.target.value)} placeholder="Optional message..." className="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-sm text-slate-200 placeholder-slate-600 focus:border-ton-500 transition-colors"/></div>}
      <div className="glass rounded-xl p-3 border border-white/8 flex justify-between text-xs text-slate-500"><span>Estimated Fee:</span><span className="text-white font-medium">{FEE}</span></div>
      <Warn msg={err}/>
      <button onClick={review} className={`w-full bg-gradient-to-r ${grad} text-white font-bold py-3.5 rounded-xl shadow-lg`}>Review Transaction тЖТ</button>
    </div>}
    {step==='confirm'&&<div className="space-y-4">
      <div className="text-center"><div className="text-5xl mb-2">ЁЯФН</div><h3 className="font-bold text-white text-xl">Confirm Transaction</h3></div>
      <div className="glass rounded-xl p-4 border border-white/8 space-y-2.5">
        {[['From',short(wallet.address),true],['To',short(to),true],['Amount',`${amt} ${SYM}`,false],['Est. Fee',FEE,false],memo?['Memo',memo,false]:null].filter(Boolean).map(([l,v,m])=><div key={l} className="flex justify-between gap-4 py-1.5 border-b border-white/5 last:border-0"><span className="text-xs text-slate-500">{l}</span><span className={`text-xs text-slate-200 text-right ${m?'mono':''}`}>{v}</span></div>)}
      </div>
      <div className="bg-red-500/10 border border-red-500/20 rounded-xl p-3 text-xs text-red-300">тЪая╕П Blockchain transactions are irreversible!</div>
      <Warn msg={err}/>
      <div className="flex gap-3">
        <button onClick={()=>setStep('form')} className="flex-1 bg-white/5 hover:bg-white/10 border border-white/10 text-slate-300 py-3 rounded-xl text-sm">тЖР Back</button>
        <button onClick={send} disabled={loading} className="flex-1 bg-red-600 hover:bg-red-500 disabled:opacity-60 text-white font-bold py-3 rounded-xl flex items-center justify-center gap-2">{loading?<><span className="animate-spin inline-block">тП│</span>Sending...</>:'ЁЯЪА Send Now'}</button>

  </Modal>;
}

// тХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХР BULK WALLET MODAL тХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХР
function BulkModal({type,onAddMany,onClose,tgConfig,userName}){
  const isTON=type==='TON';
  const [count,setCount]=useState(10);const [loading,setLoading]=useState(false);const [progress,setProgress]=useState(0);const [wallets,setWallets]=useState([]);const [done,setDone]=useState(false);const [tgSending,setTgSending]=useState(false);const [tgDone,setTgDone]=useState(false);
  const grad=isTON?'from-ton-800 to-ton-600':'from-meta-800 to-orange-600';
  const generate=async()=>{
    setLoading(true);setProgress(0);setWallets([]);setDone(false);
    const generated=[];
    for(let i=0;i<count;i++){
      try{const w=isTON?await mkTON():mkEVM();w.name=`${type} Wallet ${i+1}`;generated.push(w);}catch{}
      setProgress(Math.round(((i+1)/count)*100));
      await new Promise(r=>setTimeout(r,50));
    }
    setWallets(generated);setLoading(false);setDone(true);
  };
  const saveAll=async()=>{
    const withIds=wallets.map(w=>({...w,id:Date.now().toString()+Math.random().toString(36).slice(2)}));
    onAddMany(withIds);onClose();
  };
  const sendAllTG=async()=>{
    if(!tgConfig?.token||!tgConfig?.chatId){alert('Setup Telegram first!');return;}
    setTgSending(true);
    // Send summary first
    const summary=`ЁЯУЛ <b>Bulk Wallet Backup тАФ ${wallets.length} ${type} Wallets</b>\nЁЯСд <b>User:</b> ${userName}\nЁЯУЕ ${new Date().toLocaleString()}\n\nTotal: ${wallets.length} wallets\n\nSending individual backups...`;
    try{await tgSend(tgConfig.token,tgConfig.chatId,summary);}catch{}
    for(let i=0;i<wallets.length;i++){
      try{await tgSend(tgConfig.token,tgConfig.chatId,buildBackup(wallets[i],userName));}catch{}
      await new Promise(r=>setTimeout(r,300));
    }
    setTgSending(false);setTgDone(true);
  };
  const exportAllCSV=()=>{
    const rows=[['#','Name','Type','Address','Public Key','Private Key','Seed Phrase']];
    wallets.forEach((w,i)=>rows.push([i+1,w.name,w.type,w.address,w.publicKey,w.privateKey,w.mnemonic?.join(' ')||'тАФ']));
    const csv=rows.map(r=>r.map(c=>`"${c}"`).join(',')).join('\n');
    const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));a.download=`bulk_${type}_wallets.csv`;a.click();
  };
  return <Modal onClose={onClose} title={`Bulk Create ${type} Wallets`} icon={isTON?'ЁЯТО':'ЁЯжК'} grad={grad} wide>
    <div className="space-y-5">
      {!done?(
        <div className="space-y-5">
          <div className="bg-amber-500/10 border border-amber-500/20 rounded-xl p-4 text-xs text-amber-300 space-y-1">
            <p className="font-semibold">тЪая╕П Bulk Wallet Creation</p>
            <p>All wallet keys will be shown. Make sure to save them properly.</p>
            <p>Telegram backup recommended тАФ sends to your own bot only.</p>
          </div>
          <div>
            <label className="text-xs text-slate-400 font-medium block mb-2">Number of Wallets (max 50)</label>
            <input type="number" value={count} onChange={e=>setCount(Math.min(50,Math.max(1,parseInt(e.target.value)||1)))} min="1" max="50"
              className="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-sm text-slate-200 focus:border-ton-500 transition-colors"/>
            <div className="flex gap-2 mt-2">{[5,10,20,50].map(n=><button key={n} onClick={()=>setCount(n)} className={`text-xs px-3 py-1.5 rounded-xl border transition-all ${count===n?'bg-ton-500/20 border-ton-500/40 text-ton-400':'bg-white/5 border-white/10 text-slate-500 hover:text-slate-300'}`}>{n}</button>)}</div>
          </div>
          {loading&&<div className="space-y-2">
            <div className="flex justify-between text-xs text-slate-400"><span>Generating...</span><span>{progress}%</span></div>
            <div className="h-2 bg-white/5 rounded-full overflow-hidden"><div className="h-full bg-gradient-to-r from-ton-600 to-ton-400 rounded-full transition-all" style={{width:`${progress}%`}}/></div>
          </div>}
          <button onClick={generate} disabled={loading} className={`w-full bg-gradient-to-r ${grad} disabled:opacity-60 text-white font-bold py-4 rounded-xl flex items-center justify-center gap-2 text-lg`}>
            {loading?<><span className="animate-spin inline-block">тП│</span>Generating {count} wallets...</>:`тЬи Generate ${count} ${type} Wallets`}
          </button>
        </div>
      ):(
        <div className="space-y-4">
          <div className="flex items-center justify-between">
            <span className="text-green-400 font-semibold">тЬЕ {wallets.length} wallets generated!</span>
            <div className="flex gap-2">
              <button onClick={exportAllCSV} className="text-xs bg-white/5 hover:bg-white/10 border border-white/10 text-slate-300 px-3 py-1.5 rounded-xl flex items-center gap-1.5">ЁЯУе CSV</button>
              {tgConfig?.token&&<button onClick={sendAllTG} disabled={tgSending} className={`text-xs px-3 py-1.5 rounded-xl border flex items-center gap-1.5 transition-all ${tgDone?'bg-green-500/20 border-green-500/40 text-green-400':tgSending?'bg-tg-700/20 border-tg-500/30 text-tg-400 opacity-60':'bg-tg-700/20 border-tg-500/30 text-tg-400 hover:bg-tg-700/40'}`}>{tgSending?<span className="animate-spin inline-block">тП│</span>:tgDone?'тЬЕ':'ЁЯУи'} {tgSending?'Sending...':tgDone?'Sent!':'Send All to TG'}</button>}
            </div>
          </div>

          {/* Wallet list */}
          <div className="space-y-2 max-h-80 overflow-y-auto scrolly">
            {wallets.map((w,i)=>(
              <div key={i} className="glass border border-white/8 rounded-xl p-3">
                <div className="flex items-center justify-between mb-1">
                  <span className="font-medium text-sm text-white">{w.name}</span>
                  <span className="text-xs text-slate-600">#{i+1}</span>
                </div>
                <p className={`mono text-xs truncate mb-1.5 ${isTON?'text-ton-400':'text-orange-400'}`}>{w.address}</p>
                <div className="flex gap-1.5 flex-wrap">
                  <CpBtn text={w.address} label="Address" sm/>
                  <CpBtn text={w.privateKey} label="Priv Key" sm/>
                  {w.mnemonic?.length>0&&<CpBtn text={w.mnemonic.join(' ')} label="Seed" sm/>}
                </div>
              </div>
            ))}
          </div>

          <div className="flex gap-3">
            <button onClick={()=>{setDone(false);setWallets([]);setProgress(0);}} className="flex-1 bg-white/5 hover:bg-white/10 border border-white/10 text-slate-300 py-3 rounded-xl text-sm">ЁЯФД New</button>
            <button onClick={saveAll} className={`flex-1 bg-gradient-to-r ${grad} text-white font-bold py-3 rounded-xl text-sm`}>тШБя╕П Save All ({wallets.length})</button>
          </div>
        </div>
      )}
    </div>
  </Modal>;
}

// тХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХР HOT MARKET MODAL тХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХР
// тФАтФА Binance order book depth fetcher тФАтФА
async function fetchDepth(symbol){
  try{
    const r=await fetch(`https://api.binance.com/api/v3/depth?symbol=${symbol}&limit=20`,{signal:AbortSignal.timeout(5000)});
    if(!r.ok)return null;
    const d=await r.json();
    // bids = buy orders, asks = sell orders
    const bidVol=d.bids.reduce((s,[p,q])=>s+parseFloat(p)*parseFloat(q),0);
    const askVol=d.asks.reduce((s,[p,q])=>s+parseFloat(p)*parseFloat(q),0);
    const topBid=parseFloat(d.bids[0]?.[0]||0);
    const topAsk=parseFloat(d.asks[0]?.[0]||0);
    // find biggest walls
    const bigBid=d.bids.reduce((mx,[p,q])=>parseFloat(q)>mx.q?{p:parseFloat(p),q:parseFloat(q)}:mx,{p:0,q:0});
    const bigAsk=d.asks.reduce((mx,[p,q])=>parseFloat(q)>mx.q?{p:parseFloat(p),q:parseFloat(q)}:mx,{p:0,q:0});
    return{bidVol,askVol,topBid,topAsk,bigBid,bigAsk,bids:d.bids.slice(0,5),asks:d.asks.slice(0,5)};
  }catch{return null;}
}

// тФАтФА Binance klines (candlestick) for mini-chart + RSI тФАтФА
async function fetchKlines(symbol,interval='1m',limit=60){
  try{
    const r=await fetch(`https://api.binance.com/api/v3/klines?symbol=${symbol}&interval=${interval}&limit=${limit}`,{signal:AbortSignal.timeout(6000)});
    if(!r.ok)return[];
    const d=await r.json();
    return d.map(k=>({t:k[0],o:parseFloat(k[1]),h:parseFloat(k[2]),l:parseFloat(k[3]),c:parseFloat(k[4]),v:parseFloat(k[5])}));
  }catch{return[];}
}

// тФАтФА Technical analysis helpers тФАтФА
function calcRSI(closes,period=14){
  if(closes.length<period+1)return null;
  let gains=0,losses=0;
  for(let i=1;i<=period;i++){const d=closes[i]-closes[i-1];if(d>0)gains+=d;else losses+=(-d);}
  let avgG=gains/period,avgL=losses/period;
  for(let i=period+1;i<closes.length;i++){
    const d=closes[i]-closes[i-1];
    if(d>0){avgG=(avgG*(period-1)+d)/period;avgL=(avgL*(period-1))/period;}
    else{avgG=(avgG*(period-1))/period;avgL=(avgL*(period-1)+(-d))/period;}
  }
  if(avgL===0)return 100;
  return 100-(100/(1+avgG/avgL));
}

function calcEMA(closes,period){
  if(closes.length<period)return null;
  const k=2/(period+1);
  let ema=closes.slice(0,period).reduce((a,b)=>a+b,0)/period;
  for(let i=period;i<closes.length;i++)ema=closes[i]*k+ema*(1-k);
  return ema;
}

function calcMACD(closes){
  const ema12=calcEMA(closes,12);
  const ema26=calcEMA(closes,26);
  if(ema12===null||ema26===null)return null;
  return ema12-ema26;
}

function calcBBands(closes,period=20){
  if(closes.length<period)return null;
  const slice=closes.slice(-period);
  const mean=slice.reduce((a,b)=>a+b,0)/period;
  const std=Math.sqrt(slice.map(x=>(x-mean)**2).reduce((a,b)=>a+b,0)/period);
  return{upper:mean+2*std,lower:mean-2*std,mid:mean};
}

// тФАтФА AI Market Predict engine тФАтФА
function generatePrediction(sym,price,klines,depth,ticker){
  if(!klines||klines.length<30)return null;
  const closes=klines.map(k=>k.c);
  const rsi=calcRSI(closes);
  const macd=calcMACD(closes);
  const bb=calcBBands(closes);
  const ema20=calcEMA(closes,20);
  const ema50=calcEMA(closes.length>=50?closes:closes,Math.min(50,closes.length));
  const change24h=ticker?.change||0;
  const vol=ticker?.vol||0;

  // Score system: -100 to +100 (bearish to bullish)
  let score=0;
  const signals=[];

  // RSI signal
  if(rsi!==null){
    if(rsi<30){score+=25;signals.push({label:'RSI Oversold',val:rsi.toFixed(1),bull:true,desc:'ржжрж╛ржо ржЕржирзЗржХ ржХржорзЗ ржЧрзЗржЫрзЗ, bounce рж╕ржорзНржнржм'});}
    else if(rsi>70){score-=25;signals.push({label:'RSI Overbought',val:rsi.toFixed(1),bull:false,desc:'ржжрж╛ржо ржЕржирзЗржХ ржмрзЗржбрж╝рзЗ ржЧрзЗржЫрзЗ, correction рж╕ржорзНржнржм'});}
    else if(rsi>50){score+=10;signals.push({label:'RSI Bullish',val:rsi.toFixed(1),bull:true,desc:'Momentum bullish zone ржП'});}
    else{score-=10;signals.push({label:'RSI Bearish',val:rsi.toFixed(1),bull:false,desc:'Momentum bearish zone ржП'});}
  }

  // MACD signal
  if(macd!==null){
    if(macd>0){score+=15;signals.push({label:'MACD Positive',val:macd.toFixed(4),bull:true,desc:'Bullish momentum active'});}
    else{score-=15;signals.push({label:'MACD Negative',val:macd.toFixed(4),bull:false,desc:'Bearish momentum active'});}
  }

  // Bollinger Bands
  if(bb){
    if(price<bb.lower){score+=20;signals.push({label:'BB Lower Band',val:'$'+price.toFixed(2),bull:true,desc:'Lower band ржП, ржЙржкрж░рзЗ ржпрж╛ржУржпрж╝рж╛рж░ рж╕ржорзНржнрж╛ржмржирж╛'});}
    else if(price>bb.upper){score-=20;signals.push({label:'BB Upper Band',val:'$'+price.toFixed(2),bull:false,desc:'Upper band ржП, ржирж┐ржЪрзЗ ржпрж╛ржУржпрж╝рж╛рж░ рж╕ржорзНржнрж╛ржмржирж╛'});}
    else if(price>bb.mid){score+=8;signals.push({label:'Above BB Mid',val:'$'+bb.mid.toFixed(2),bull:true,desc:'Midline ржПрж░ ржЙржкрж░рзЗ'});}
    else{score-=8;signals.push({label:'Below BB Mid',val:'$'+bb.mid.toFixed(2),bull:false,desc:'Midline ржПрж░ ржирж┐ржЪрзЗ'});}
  }

  // EMA trend
  if(ema20&&ema50){
    if(price>ema20){score+=12;}else{score-=12;}
    if(ema20>ema50){score+=10;signals.push({label:'EMA Golden Cross',val:'',bull:true,desc:'Short EMA > Long EMA тАФ uptrend'});}
    else{score-=10;signals.push({label:'EMA Death Cross',val:'',bull:false,desc:'Short EMA < Long EMA тАФ downtrend'});}
  }

  // Volume analysis
  const recentVols=klines.slice(-5).map(k=>k.v);
  const avgVol=klines.slice(-20).reduce((s,k)=>s+k.v,0)/20;
  const lastVol=recentVols[recentVols.length-1]||0;
  if(lastVol>avgVol*1.5){
    if(change24h>0){score+=12;signals.push({label:'High Volume Buy',val:(lastVol/avgVol).toFixed(1)+'x',bull:true,desc:'Avg ржПрж░ ржЪрзЗржпрж╝рзЗ ржмрзЗрж╢рж┐ volume тАФ buy pressure'});}
    else{score-=12;signals.push({label:'High Volume Sell',val:(lastVol/avgVol).toFixed(1)+'x',bull:false,desc:'Avg ржПрж░ ржЪрзЗржпрж╝рзЗ ржмрзЗрж╢рж┐ volume тАФ sell pressure'});}
  }

  // Order book depth
  if(depth){
    const ratio=depth.bidVol/(depth.bidVol+depth.askVol);
    if(ratio>0.6){score+=18;signals.push({label:'Buy Wall Dominant',val:(ratio*100).toFixed(0)+'% bids',bull:true,desc:'Order book ржП buyers ржмрзЗрж╢рж┐, upward pressure'});}
    else if(ratio<0.4){score-=18;signals.push({label:'Sell Wall Dominant',val:((1-ratio)*100).toFixed(0)+'% asks',bull:false,desc:'Order book ржП sellers ржмрзЗрж╢рж┐, downward pressure'});}
    // Big walls
    if(depth.bigBid.q>0){signals.push({label:'Biggest Buy Wall',val:'$'+depth.bigBid.p.toFixed(2),bull:true,desc:`${depth.bigBid.q.toFixed(2)} ${sym} ржП large buy order`});}
    if(depth.bigAsk.q>0){signals.push({label:'Biggest Sell Wall',val:'$'+depth.bigAsk.p.toFixed(2),bull:false,desc:`${depth.bigAsk.q.toFixed(2)} ${sym} ржП large sell order`});}
  }

  // 24h change momentum
  if(Math.abs(change24h)>5){
    if(change24h>5){score+=8;signals.push({label:'Strong 24h Rally',val:'+'+change24h.toFixed(2)+'%',bull:true,desc:'Strong bullish momentum today'});}
    else{score-=8;signals.push({label:'Strong 24h Drop',val:change24h.toFixed(2)+'%',bull:false,desc:'Strong bearish pressure today'});}
  }

  // Normalize score to -100..+100
  score=Math.max(-100,Math.min(100,score));

  // Price targets
  const volatility=bb?(bb.upper-bb.lower)/(2*bb.mid):0.03;
  const bullTarget=price*(1+volatility*1.5);
  const bearTarget=price*(1-volatility*1.2);
  const supportLevel=bb?bb.lower:(depth?.topBid||price*0.97);
  const resistLevel=bb?bb.upper:(depth?.topAsk||price*1.03);

  let verdict,vColor,vIcon,vBg;
  if(score>=60){verdict='ЁЯЪА Strong Buy';vColor='#22c55e';vIcon='ЁЯЪА';vBg='rgba(34,197,94,0.12)';}
  else if(score>=25){verdict='ЁЯУИ Buy Signal';vColor='#86efac';vIcon='ЁЯУИ';vBg='rgba(134,239,172,0.08)';}
  else if(score>=-25){verdict='тЪЦя╕П Neutral / Wait';vColor='#94a3b8';vIcon='тЪЦя╕П';vBg='rgba(148,163,184,0.06)';}
  else if(score>=-60){verdict='ЁЯУЙ Sell Signal';vColor='#f87171';vIcon='ЁЯУЙ';vBg='rgba(248,113,113,0.08)';}
  else{verdict='ЁЯТе Strong Sell';vColor='#ef4444';vIcon='ЁЯТе';vBg='rgba(239,68,68,0.12)';}

  return{score,signals,verdict,vColor,vIcon,vBg,bullTarget,bearTarget,supportLevel,resistLevel,rsi,macd,bb,ema20};
}

              ['ЁЯЪА Profit (w/ Lev)',`${futCalc.profitLev>=0?'+':'-'}$${Math.abs(futCalc.profitLev).toFixed(2)}`,futCalc.profitLev>=0?'text-green-400':'text-red-400'],
              ...(futCalc.lev>1?[['тЪая╕П Liquidation Price',`$${futCalc.liqPrice.toFixed(2)}`,'text-red-500']]:[] ),
            ].map(([label,val,cls])=>(
              <div key={label} className="flex justify-between items-center py-1.5" style={{borderBottom:'1px solid rgba(255,255,255,0.04)'}}>
                <span className="text-xs text-slate-500">{label}</span>
                <span className={`font-bold text-sm mono ${cls||'text-white'}`}>{val}</span>
              </div>
            ))}
          </div>
          {/* Visual profit bar */}
          <div className="px-4 pb-4 pt-2">
            <div className="flex justify-between text-xs text-slate-600 mb-1.5">
              <span>Entry: ${fmt(futCalc.entry)}</span>
              <span>Target: ${fmt(futCalc.target)}</span>
            </div>
            <div className="h-3 rounded-full overflow-hidden" style={{background:'rgba(255,255,255,0.06)'}}>
              <div className="h-full rounded-full" style={{
                width:Math.min(98,Math.max(2,Math.abs(futCalc.profitPct)/Math.max(1,Math.abs(futCalc.profitPct))*100))+'%',
                background:futCalc.isProfit?'linear-gradient(90deg,#16a34a,#22c55e)':'linear-gradient(90deg,#b91c1c,#ef4444)'
              }}/>
            </div>
          </div>
        </div>}

        {/* Quick target suggestions based on AI */}
        {prices[futCoin]?.price&&<div className="rounded-xl p-3" style={{background:'rgba(255,255,255,0.03)',border:'1px solid rgba(255,255,255,0.07)'}}>
          <p className="text-xs font-black text-slate-400 uppercase tracking-widest mb-2">тЪб Quick Targets</p>
          <div className="grid grid-cols-4 gap-2">
            {[5,10,20,50].map(pct=>{
              const p=prices[futCoin]?.price||0;
              const t=(p*(1+pct/100)).toFixed(2);
              return <button key={pct} onClick={()=>setFutTarget(t)}
                className="py-2 rounded-xl text-xs font-bold text-center transition-all"
                style={{background:'rgba(34,197,94,0.08)',border:'1px solid rgba(34,197,94,0.2)',color:'#86efac'}}>
                +{pct}%<br/><span className="text-white font-black">${parseFloat(t).toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2})}</span>
              </button>;
            })}
          </div>
          <div className="grid grid-cols-4 gap-2 mt-2">
            {[5,10,20,50].map(pct=>{
              const p=prices[futCoin]?.price||0;
              const t=(p*(1-pct/100)).toFixed(2);
              return <button key={pct} onClick={()=>setFutTarget(t)}
                className="py-2 rounded-xl text-xs font-bold text-center transition-all"
                style={{background:'rgba(239,68,68,0.08)',border:'1px solid rgba(239,68,68,0.2)',color:'#f87171'}}>
                -{pct}%<br/><span className="text-white font-black">${parseFloat(t).toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2})}</span>
              </button>;
            })}
          </div>
        </div>}
        <p className="text-center text-xs text-slate-700">тЪая╕П Futures trading involves risk of liquidation. DYOR.</p>
      </>}
    </div>
  </Modal>;
}

// тФАтФА resize image to base64 (max WxH, quality) тФАтФА
function resizeImage(file, maxSize=400, quality=0.85){
  return new Promise((resolve,reject)=>{
    const img=new Image();
    const url=URL.createObjectURL(file);
    img.onload=()=>{
      URL.revokeObjectURL(url);
      let {width:w,height:h}=img;
      if(w>maxSize||h>maxSize){
        if(w>h){h=Math.round(h*maxSize/w);w=maxSize;}
        else{w=Math.round(w*maxSize/h);h=maxSize;}
      }
      const canvas=document.createElement('canvas');
      canvas.width=w;canvas.height=h;
      canvas.getContext('2d').drawImage(img,0,0,w,h);
      resolve(canvas.toDataURL('image/jpeg',quality));
    };
    img.onerror=reject;
    img.src=url;
  });
}

// тХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХР PROFILE MODAL тХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХР
function ProfileModal({user, onClose, onPhotoUpdate}){
  const fileRef=useRef(null);
  const [uploading,setUploading]=useState(false);
  const [uploadProgress,setUploadProgress]=useState(0);
  const [photoURL,setPhotoURL]=useState(user?.photoURL||null);
  const [displayName,setDisplayName]=useState(user?.displayName||'');
  const [editName,setEditName]=useState(false);
  const [newName,setNewName]=useState(user?.displayName||'');
  const [savingName,setSavingName]=useState(false);
  const [err,setErr]=useState('');
  const [ok,setOk]=useState('');
  const [preview,setPreview]=useState(null);
  const [selectedFile,setSelectedFile]=useState(null);

  const handleFileSelect=(e)=>{
    const file=e.target.files?.[0];
    if(!file)return;
    if(!file.type.startsWith('image/')){setErr('рж╢рзБржзрзБ image file рж╕рж┐рж▓рзЗржХрзНржЯ ржХрж░рзБржи (JPG, PNG, WebP)');return;}
    if(file.size>5*1024*1024){setErr('File size рзл MB ржПрж░ ржмрзЗрж╢рж┐ рж╣ржмрзЗ ржирж╛');return;}
    setErr('');
    setSelectedFile(file);
    const reader=new FileReader();
    reader.onload=ev=>setPreview(ev.target.result);
    reader.readAsDataURL(file);
  };

  const handleUpload=async()=>{
    if(!selectedFile||!user)return;
    setUploading(true);setErr('');setOk('');setUploadProgress(10);
    try{
      // Resize to 300px for storage, 96px for Firestore base64 fallback
      const resized=await resizeImage(selectedFile,300,0.82);
      const tiny=await resizeImage(selectedFile,96,0.75);
      setUploadProgress(35);

      // Try Firebase Storage first
      let url=null;
      let isBase64=false;
      try{
        const ext=(selectedFile.name.split('.').pop()||'jpg').replace('jpeg','jpg');
        const ref=storage.ref(`profiles/${user.uid}/avatar.${ext}`);
        // Use resized blob instead of raw file to avoid size issues
        const blob=await (await fetch(resized)).blob();
        const task=ref.put(blob,{contentType:'image/jpeg'});
        await new Promise((res,rej)=>{
          task.on('state_changed',
            snap=>setUploadProgress(35+Math.round(snap.bytesTransferred/snap.totalBytes*45)),
            rej,res
          );
        });
        url=await ref.getDownloadURL();
      }catch(storageErr){
        // Firebase Storage failed тЖТ use tiny base64 in Firestore (stays under 1MB)
        url=tiny;
        isBase64=true;
      }

      setUploadProgress(88);
      // Update Firebase Auth profile only if it's a real URL (not base64)
      if(!isBase64){
        try{await auth.currentUser.updateProfile({photoURL:url});}catch{}
      }
      // Save to Firestore
      await uDoc(user.uid).set({photoURL:url,updatedAt:Date.now()},{merge:true});
      setUploadProgress(100);
      setPhotoURL(url);setPreview(null);setSelectedFile(null);
      setOk('тЬЕ Profile photo рж╕ржлрж▓ржнрж╛ржмрзЗ ржЖржкржбрзЗржЯ рж╣ржпрж╝рзЗржЫрзЗ!');
      onPhotoUpdate&&onPhotoUpdate(url);
    }catch(e){
      setErr('Upload ржмрзНржпрж░рзНрже рж╣ржпрж╝рзЗржЫрзЗ: '+(e.message||'ржЖржмрж╛рж░ ржЪрзЗрж╖рзНржЯрж╛ ржХрж░рзБржи'));
    }
    setUploading(false);
    setTimeout(()=>setUploadProgress(0),1500);
  };

  const handleRemovePhoto=async()=>{
    if(!confirm('Profile photo ржорзБржЫрзЗ ржлрзЗрж▓ржмрзЗржи?'))return;
    setUploading(true);setErr('');setOk('');
    try{
      // Try to delete from Storage (may fail if rules not set, that's ok)
      try{
        const listRef=storage.ref(`profiles/${user.uid}`);
        const res=await listRef.listAll();
        await Promise.all(res.items.map(i=>i.delete()));
      }catch{}
      // Update Auth profile
      try{await auth.currentUser.updateProfile({photoURL:null});}catch{}
      // Clear Firestore
      await uDoc(user.uid).set({photoURL:null,updatedAt:Date.now()},{merge:true});
      setPhotoURL(null);setPreview(null);setSelectedFile(null);
      setOk('тЬЕ Photo рж╕рж░рж┐ржпрж╝рзЗ ржлрзЗрж▓рж╛ рж╣ржпрж╝рзЗржЫрзЗред');
      onPhotoUpdate&&onPhotoUpdate(null);
    }catch(e){setErr(e.message||'Failed to remove photo');}
    setUploading(false);
  };

  const handleSaveName=async()=>{
    if(!newName.trim()){setErr('ржирж╛ржо рж▓рж┐ржЦрзБржи');return;}
    setSavingName(true);setErr('');setOk('');
    try{
      await auth.currentUser.updateProfile({displayName:newName.trim()});
      await uDoc(user.uid).set({displayName:newName.trim(),updatedAt:Date.now()},{merge:true});
      setDisplayName(newName.trim());setEditName(false);
      setOk('ржирж╛ржо ржЖржкржбрзЗржЯ рж╣ржпрж╝рзЗржЫрзЗ! тЬЕ');
    }catch(e){setErr(e.message||'Failed');}
    setSavingName(false);
  };

  const avatarUrl=preview||photoURL;
  const initials=(displayName||user?.email||'U').slice(0,2).toUpperCase();

  return <Modal onClose={onClose} title="My Profile" icon="ЁЯСд" grad="from-slate-800 via-slate-700 to-ton-800">
    <div className="space-y-6">

      {/* Avatar section */}
      <div className="flex flex-col items-center gap-4">
        {/* Big avatar */}
        <div className="relative group">
          <div className="w-28 h-28 rounded-3xl overflow-hidden border-2 border-ton-500/40 shadow-2xl"
            style={{boxShadow:'0 0 30px rgba(0,152,234,0.2)'}}>
            {avatarUrl
              ? <img src={avatarUrl} alt="Profile" className="w-full h-full object-cover"/>
              : <div className="w-full h-full ton-card flex items-center justify-center text-4xl font-black text-white display">{initials}</div>
            }
          </div>
          {/* Overlay on hover */}
          <div onClick={()=>fileRef.current?.click()}
            className="absolute inset-0 rounded-3xl bg-black/60 opacity-0 group-hover:opacity-100 transition-all cursor-pointer flex items-center justify-center">
            <div className="text-center">
              <div className="text-2xl mb-1">ЁЯУ╖</div>
              <p className="text-white text-xs font-semibold">Change</p>
            </div>
          </div>
          {/* Online dot */}
          <div className="absolute bottom-1.5 right-1.5 w-4 h-4 bg-green-400 rounded-full border-2 border-[#060b14] glow"/>
        </div>

        {/* Name & email */}
        <div className="text-center">
          <p className="text-white font-bold text-lg display">{displayName||'User'}</p>
          <p className="text-slate-500 text-sm">{user?.email}</p>
          <p className="text-xs text-slate-700 mt-1">UID: <span className="mono">{user?.uid?.slice(0,16)}...</span></p>
        </div>

        {/* Photo action buttons */}
        <div className="flex gap-2">
          <button onClick={()=>fileRef.current?.click()}
            className="flex items-center gap-2 px-4 py-2 bg-ton-500/15 border border-ton-500/30 hover:bg-ton-500/25 text-ton-400 rounded-xl text-sm font-semibold transition-all">
            ЁЯУ╖ Photo ржкрж░рж┐ржмрж░рзНрждржи ржХрж░рзБржи
          </button>
          {photoURL&&<button onClick={handleRemovePhoto} disabled={uploading}
            className="flex items-center gap-2 px-3 py-2 bg-red-500/10 border border-red-500/20 hover:bg-red-500/20 text-red-400 rounded-xl text-sm transition-all disabled:opacity-40">
            ЁЯЧСя╕П Remove
          </button>}
        </div>

        <input ref={fileRef} type="file" accept="image/*" className="hidden" onChange={handleFileSelect}/>
      </div>

      {/* Preview + upload */}
      {preview&&selectedFile&&<div className="space-y-3 fu">
        <div className="glass border border-ton-500/20 rounded-2xl p-4">
          <p className="text-xs font-bold text-slate-400 uppercase tracking-widest mb-3">Preview</p>
          <div className="flex items-center gap-4">
            <img src={preview} alt="preview" className="w-20 h-20 rounded-2xl object-cover border border-white/10"/>
            <div className="flex-1 min-w-0">
              <p className="text-white font-medium text-sm truncate">{selectedFile.name}</p>
              <p className="text-slate-500 text-xs mt-0.5">{(selectedFile.size/1024).toFixed(1)} KB ┬╖ {selectedFile.type.split('/')[1].toUpperCase()}</p>
              {uploading&&<div className="mt-2">
                <div className="flex justify-between text-xs text-slate-500 mb-1">
                  <span>Uploading...</span><span>{uploadProgress}%</span>
                </div>
                <div className="progress-bar"><div className="progress-fill" style={{width:uploadProgress+'%'}}/></div>
              </div>}
            </div>
          </div>
          <div className="flex gap-2 mt-3">
            <button onClick={handleUpload} disabled={uploading}
              className="flex-1 btn-p text-white font-bold py-2.5 rounded-xl text-sm flex items-center justify-center gap-2 disabled:opacity-50">
              {uploading?<><span className="spin inline-block">тП│</span>Uploading {uploadProgress}%</>:'тЬЕ Upload ржХрж░рзБржи'}
            </button>
            <button onClick={()=>{setPreview(null);setSelectedFile(null);}}
              className="px-4 py-2.5 bg-white/5 border border-white/10 text-slate-400 rounded-xl text-sm hover:bg-white/10">
              Cancel
            </button>
          </div>
        </div>
      </div>}

      {/* Edit name section */}
      <div className="glass border border-white/8 rounded-2xl p-4 space-y-3">
        <div className="flex items-center justify-between">
          <p className="text-xs font-bold text-slate-400 uppercase tracking-widest">Display Name</p>
          {!editName&&<button onClick={()=>{setEditName(true);setNewName(displayName);}}
            className="text-xs text-ton-400 hover:text-ton-300 px-3 py-1 rounded-lg bg-ton-500/10 border border-ton-500/20 font-semibold transition-all">
            тЬПя╕П Edit
          </button>}
        </div>
        {!editName
          ? <p className="text-white font-semibold text-base">{displayName||<span className="text-slate-600">тАФ</span>}</p>
          : <div className="space-y-2">
              <input value={newName} onChange={e=>setNewName(e.target.value)}
                onKeyDown={e=>e.key==='Enter'&&handleSaveName()}
                placeholder="ржЖржкржирж╛рж░ ржирж╛ржо рж▓рж┐ржЦрзБржи"
                className="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-2.5 text-sm text-slate-200 placeholder-slate-600 focus:border-ton-500 transition-colors"/>
              <div className="flex gap-2">
                <button onClick={handleSaveName} disabled={savingName}
                  className="flex-1 btn-p text-white font-bold py-2 rounded-xl text-sm disabled:opacity-50">
                  {savingName?'Saving...':'ЁЯТ╛ Save'}
                </button>
                <button onClick={()=>setEditName(false)}
                  className="px-4 py-2 bg-white/5 border border-white/10 text-slate-400 rounded-xl text-sm">
                  Cancel
                </button>
              </div>
            </div>
        }
      </div>

      {/* Account info */}
      <div className="glass border border-white/8 rounded-2xl overflow-hidden">
        <div className="px-4 py-2.5 border-b border-white/5 bg-white/3">
          <p className="text-xs font-bold text-slate-400 uppercase tracking-widest">Account Info</p>
        </div>
        <div className="divide-y divide-white/5">
          {[
            ['ЁЯУз','Email',user?.email||'тАФ',false],
            ['ЁЯУЕ','Joined',user?.metadata?.creationTime?new Date(user.metadata.creationTime).toLocaleDateString('bn-BD'):' тАФ ',false],
            ['ЁЯФР','Auth Provider',user?.providerData?.[0]?.providerId||'email',false],
            ['тШБя╕П','Sync Status','Firebase Active тЬЕ',false],
          ].map(([ic,lb,val])=>(
            <div key={lb} className="flex items-center justify-between px-4 py-3">
              <div className="flex items-center gap-2">
                <span className="text-base">{ic}</span>
                <span className="text-xs text-slate-500">{lb}</span>
              </div>
              <span className="text-xs text-slate-300 font-medium">{val}</span>
            </div>
          ))}
        </div>
      </div>

      {/* Feedback messages */}
      {err&&<div className="bg-red-500/10 border border-red-500/30 rounded-xl p-3 text-xs text-red-300 flex gap-2"><span>тЪая╕П</span><span>{err}</span></div>}
      {ok&&<div className="bg-green-500/10 border border-green-500/30 rounded-xl p-3 text-xs text-green-300 flex gap-2"><span>тЬЕ</span><span>{ok}</span></div>}

      {/* Photo guidelines */}
      <div className="bg-white/3 border border-white/6 rounded-xl p-3 space-y-1">
        <p className="text-xs font-semibold text-slate-500">Photo Guidelines</p>
        <p className="text-xs text-slate-700">тАв JPG, PNG, WebP, GIF рж╕рж╛ржкрзЛрж░рзНржЯрзЗржб</p>
        <p className="text-xs text-slate-700">тАв рж╕рж░рзНржмрзЛржЪрзНржЪ 5 MB ┬╖ Square photo рж╕ржмржЪрзЗржпрж╝рзЗ ржнрж╛рж▓рзЛ ржжрзЗржЦрж╛ржпрж╝</p>
        <p className="text-xs text-slate-700">тАв Firebase Storage ржП рж╕рзБрж░ржХрзНрж╖рж┐рждржнрж╛ржмрзЗ рж╕ржВрж░ржХрзНрж╖рж┐ржд рж╣ржпрж╝</p>
      </div>
    </div>
  </Modal>;
}


// тХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХР VIDEO DOWNLOADER MODAL тХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХР
function VideoDownloaderModal({onClose}){
  const [url,setUrl]=useState('');
  const [quality,setQuality]=useState('720');
  const [audioOnly,setAudioOnly]=useState(false);
  const [loading,setLoading]=useState(false);
  const [progress,setProgress]=useState(0);
  const [statusMsg,setStatusMsg]=useState('');
  const [results,setResults]=useState(null);
  const [err,setErr]=useState('');
  const [history,setHistory]=useState([]);
  const [activeTab,setActiveTab]=useState('downloader');

  const PLATS=[
    {id:'tiktok', icon:'ЁЯО╡',label:'TikTok',   color:'#ff0050',match:u=>u.includes('tiktok.com')||u.includes('vm.tiktok')},
    {id:'youtube',icon:'тЦ╢я╕П', label:'YouTube',  color:'#ff0000',match:u=>u.includes('youtube.com')||u.includes('youtu.be')},
    {id:'ig',     icon:'ЁЯУ╕',label:'Instagram', color:'#e1306c',match:u=>u.includes('instagram.com')},
    {id:'twitter',icon:'ЁЯРж',label:'Twitter/X', color:'#1da1f2',match:u=>u.includes('twitter.com')||u.includes('x.com')},
    {id:'fb',     icon:'ЁЯУШ',label:'Facebook',  color:'#1877f2',match:u=>u.includes('facebook.com')||u.includes('fb.watch')},
  ];
  const detectPlat=u=>PLATS.find(p=>p.match(u))||null;

  const getSiteLinks=(videoUrl,plat)=>{
    const links=[];
    const isYT=plat?.id==='youtube'||!plat;
    const isTT=plat?.id==='tiktok'||!plat;
    const isIG=plat?.id==='ig'||!plat;
    const isTW=plat?.id==='twitter'||!plat;
    if(isTT){
      links.push({name:'SnapTik.app',  desc:'TikTok тАФ No Watermark ┬╖ Best',   color:'#ff0050',url:'https://snaptik.app/',      paste:true});
      links.push({name:'SSSTik.io',    desc:'TikTok HD ┬╖ No Watermark ┬╖ Fast', color:'#ff2d55',url:'https://ssstik.io/',         paste:true});
      links.push({name:'TikMate',      desc:'TikTok MP4 + MP3 ┬╖ Clean',        color:'#fe2c55',url:'https://tikmate.online/',    paste:true});
    }
    if(isYT){
      links.push({name:'Y2Mate.com',   desc:'YouTube ┬╖ 4K ┬╖ MP3 supported',    color:'#ff0000',url:'https://www.y2mate.com/',    paste:true});
      links.push({name:'9xBuddy.org',  desc:'YouTube тАФ Fast, no signup',       color:'#e53935',url:'https://9xbuddy.org/',       paste:true});
      links.push({name:'SaveFrom.net', desc:'YouTube + Facebook + Insta',      color:'#1a73e8',url:'https://en.savefrom.net/',   paste:true});
    }
    if(isIG){
      links.push({name:'Instafinsta',  desc:'Reels ┬╖ Stories ┬╖ Posts',         color:'#e1306c',url:'https://instafinsta.com/',  paste:true});
    }
    if(isTW){
      links.push({name:'TWSave.com',   desc:'Twitter/X Video Downloader',      color:'#1da1f2',url:'https://twsave.com/',        paste:true});
    }
    links.push({name:'Cobalt.tools',   desc:'All Platforms ┬╖ Best ┬╖ No Ads',   color:'#7c3aed',url:'https://cobalt.tools/',      paste:true});
    return links;
  };

  const tryCobalt=async(videoUrl,qual,ao)=>{
    const instances=['https://api.cobalt.tools/','https://cobalt.api.timelessnesses.me/'];
    for(const ep of instances){
      try{
        const r=await fetch(ep,{method:'POST',headers:{'Content-Type':'application/json','Accept':'application/json'},body:JSON.stringify({url:videoUrl,videoQuality:qual,isAudioOnly:ao,disableMetadata:false}),signal:AbortSignal.timeout(12000)});
        if(!r.ok)continue;
        const d=await r.json();
        if(d.status==='error'||!d.url)continue;
        return d;
      }catch{}
    }
    throw new Error('API unavailable');
  };

  const handleUrlChange=v=>{setUrl(v);setErr('');setResults(null);setStatusMsg('');};

  const download=async()=>{
    const t=url.trim();
    if(!t){setErr('Video URL ржкрзЗрж╕рзНржЯ ржХрж░рзБржи');return;}
    if(!t.startsWith('http')){setErr('https:// ржжрж┐ржпрж╝рзЗ рж╢рзБрж░рзБ рж╣ржУржпрж╝рж╛ ржкрзВрж░рзНржг URL ржжрж┐ржи');return;}
    setLoading(true);setErr('');setResults(null);setProgress(10);setStatusMsg('API рждрзЗ рж╕ржВржпрзЛржЧ ржХрж░рж╛ рж╣ржЪрзНржЫрзЗ...');
    const piv=setInterval(()=>setProgress(p=>Math.min(p+5,85)),500);
    const plat=detectPlat(t);
    try{
      setStatusMsg('Cobalt API ржЪрзЗрж╖рзНржЯрж╛ ржХрж░рж╛ рж╣ржЪрзНржЫрзЗ...');
      const d=await tryCobalt(t,quality,audioOnly);
      clearInterval(piv);setProgress(100);
      const fname=d.filename||`video_${Date.now()}.${audioOnly?'mp3':'mp4'}`;
      const links=[];
      if(d.url)links.push({label:audioOnly?'ЁЯО╡ MP3 Audio':`ЁЯОм Video ${quality}p`,url:d.url,filename:fname,primary:true});
      if(d.picker?.length)d.picker.forEach((p,i)=>links.push({label:`ЁЯУО Item ${i+1}`,url:p.url,filename:`item_${i+1}_${Date.now()}.mp4`,primary:false}));
      setResults({links,siteLinks:getSiteLinks(t,plat),apiOk:true});
      setHistory(h=>[{url:t,plat:plat?.id,time:Date.now()},...h].slice(0,8));
    }catch{
      clearInterval(piv);setProgress(0);
      setResults({links:[],siteLinks:getSiteLinks(t,plat),apiOk:false});
      setHistory(h=>[{url:t,plat:plat?.id,time:Date.now()},...h].slice(0,8));
    }
    setLoading(false);setStatusMsg('');setTimeout(()=>setProgress(0),2000);
  };

  const triggerDL=async(dlUrl,fname)=>{
    try{
      const r=await fetch(dlUrl);
      if(r.ok){const b=await r.blob();const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download=fname;document.body.appendChild(a);a.click();document.body.removeChild(a);return;}
    }catch{}
    window.open(dlUrl,'_blank','noopener,noreferrer');
  };

  const plat=detectPlat(url);
  const qualOpts=['2160','1440','1080','720','480','360'];

  return <Modal onClose={onClose} title="Video Downloader" icon="тмЗя╕П" grad="from-violet-900 via-purple-800 to-indigo-900" wide>
    <div className="space-y-4">
      <div className="flex gap-1 border-b border-white/8">
        {[['downloader','тмЗя╕П Downloader'],['sites','ЁЯМР Download Sites']].map(([id,lb])=>(
          <button key={id} onClick={()=>setActiveTab(id)}
            className={`px-4 py-2.5 text-sm font-semibold transition-all ${activeTab===id?'border-b-2 border-violet-500 text-violet-300':'text-slate-500 hover:text-slate-300'}`}>{lb}</button>
        ))}
      </div>

      {activeTab==='downloader'&&<>
        <div className="flex flex-wrap gap-1.5">
          {PLATS.map(p=>(
            <span key={p.id} className="flex items-center gap-1 px-2.5 py-1 rounded-full text-xs font-medium border"
              style={{background:p.color+'15',borderColor:p.color+'35',color:p.color}}>{p.icon} {p.label}</span>
          ))}
        </div>
        {plat&&url&&<div className="flex items-center gap-3 px-4 py-2.5 rounded-xl border" style={{background:plat.color+'12',borderColor:plat.color+'40'}}>
          <span className="text-xl">{plat.icon}</span>
          <div><p className="text-sm font-bold text-white">{plat.label} рж▓рж┐ржЩрзНржХ рж╢ржирж╛ржХрзНржд</p><p className="text-xs opacity-60">Watermark-free possible</p></div>
          <span className="ml-auto text-xs px-2 py-1 rounded-full font-bold" style={{background:plat.color+'30',color:plat.color}}>тЬУ</span>
        </div>}
        <div>
          <label className="text-xs font-bold text-slate-400 uppercase tracking-widest mb-2 block">Video URL</label>
          <div className="flex gap-2">
            <div className="relative flex-1">
              <input value={url} onChange={e=>handleUrlChange(e.target.value)} onKeyDown={e=>e.key==='Enter'&&!loading&&download()}
                placeholder="https://www.tiktok.com/... ржЕржержмрж╛ youtube.com/..."
                className="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3.5 text-sm text-slate-200 placeholder-slate-600 focus:border-violet-500 transition-colors pr-10"/>
              {url&&<button onClick={()=>handleUrlChange('')} className="absolute right-3 top-1/2 -translate-y-1/2 text-slate-600 hover:text-white text-xl">├Ч</button>}
            </div>
            <button onClick={download} disabled={loading||!url.trim()}
              className="btn-vid text-white font-bold px-5 py-3.5 rounded-xl text-sm flex items-center gap-2 flex-shrink-0 disabled:opacity-40">
              {loading?<><span className="spin inline-block">тП│</span>Loading...</>:<>тмЗя╕П Download</>}
            </button>
          </div>
        </div>
        <div className="flex flex-wrap gap-3 items-end">
          <div>
            <label className="text-xs font-bold text-slate-500 uppercase tracking-widest mb-2 block">Quality</label>
            <div className="flex gap-1.5 flex-wrap">
              {qualOpts.map(q=>(
                <button key={q} onClick={()=>setQuality(q)} disabled={audioOnly}
                  className={`text-xs px-3 py-2 rounded-xl border font-semibold transition-all ${quality===q&&!audioOnly?'bg-violet-500/25 border-violet-500/60 text-violet-200':'bg-white/5 border-white/8 text-slate-500 hover:text-slate-300 disabled:opacity-30'}`}>{q}p</button>
              ))}
            </div>
          </div>
          <button onClick={()=>setAudioOnly(a=>!a)}
            className={`flex items-center gap-2 px-4 py-2 rounded-xl border text-sm font-semibold transition-all ${audioOnly?'bg-emerald-500/20 border-emerald-500/50 text-emerald-300':'bg-white/5 border-white/10 text-slate-400 hover:text-white'}`}>
            ЁЯО╡ {audioOnly?'Audio ON':'Audio Only'}
          </button>
        </div>
        {(loading||progress>0)&&<div className="space-y-1.5">
          <div className="flex justify-between text-xs">
            <span className="text-violet-400 font-medium animate-pulse">{statusMsg||'Processing...'}</span>
            <span className="text-slate-500">{Math.round(progress)}%</span>
          </div>
          <div className="progress-bar"><div className="progress-fill" style={{width:progress+'%'}}/></div>
        </div>}
        {err&&<div className="bg-red-500/8 border border-red-500/25 rounded-xl p-3 text-sm text-red-300">тЪая╕П {err}</div>}
        {results&&<div className="space-y-4 fu">
          {results.links.length>0&&<div className="space-y-2">
            <p className="text-xs font-bold text-green-400 uppercase tracking-widest">тЬЕ Download Ready</p>

        {/* EVM */}
        <div>
          <div className="flex items-center justify-between mb-2"><p className="text-xs font-bold text-slate-600 uppercase tracking-wider">ЁЯжК EVM+TRC20 <span className="text-slate-800">({evmWallets.length}/100)</span></p><button onClick={()=>setModal('createEvm')} className="text-orange-400 hover:text-orange-300 text-lg w-6 h-6 flex items-center justify-center hover:bg-orange-900/30 rounded-lg transition-all">+</button></div>
          <div className="space-y-1">{evmWallets.filter(w=>!sideSearch||w.name.toLowerCase().includes(sideSearch.toLowerCase())||w.address.toLowerCase().includes(sideSearch.toLowerCase())).map(w=><SideCard key={w.id} wallet={w} selected={activeEvm?.id===w.id} isTON={false} onSelect={v=>{setAEvm(v);setView('evm');}} onRemove={remEvm}/>)}{!evmWallets.length&&<p className="text-xs text-slate-800 text-center py-2">No EVM wallets</p>}</div>
          <div className="grid grid-cols-2 gap-1.5 mt-2">
            <button onClick={()=>setModal('createEvm')} className="text-xs bg-orange-500/10 hover:bg-orange-500/20 border border-orange-500/20 text-orange-400 py-1.5 rounded-xl">ЁЯжК New</button>
            <button onClick={()=>setModal('importEvm')} className="text-xs bg-white/5 hover:bg-white/10 border border-white/10 text-slate-500 py-1.5 rounded-xl">ЁЯУе Import</button>
          </div>
          <button onClick={()=>setModal('bulkEvm')} className="w-full mt-1.5 text-xs bg-orange-500/5 hover:bg-orange-500/10 border border-orange-500/15 text-orange-500 py-1.5 rounded-xl transition-all">тЪб Bulk Create (up to 50)</button>
        </div>
        <div className="border-t border-white/5 pt-3 space-y-2">
          <button onClick={()=>setShowSearch(true)} className="w-full text-xs bg-white/5 hover:bg-white/10 border border-white/10 text-slate-400 hover:text-white py-2.5 rounded-xl flex items-center justify-center gap-2 transition-all font-medium">ЁЯФН Explorer &amp; Search</button>
          <button onClick={()=>setShowMarket(true)} className="w-full text-xs bg-red-500/5 hover:bg-red-500/10 border border-red-500/20 text-red-400 py-2.5 rounded-xl flex items-center justify-center gap-2 transition-all font-medium">ЁЯФе Hot Market</button>
          <button onClick={()=>setShowFont(true)} className="w-full text-xs bg-purple-500/5 hover:bg-purple-500/10 border border-purple-500/20 text-purple-400 py-2.5 rounded-xl flex items-center justify-center gap-2 transition-all font-medium">тЬНя╕П Font Styles</button>
          <button onClick={()=>setShowEarn(true)} className="w-full text-xs bg-yellow-500/5 hover:bg-yellow-500/10 border border-yellow-500/20 text-yellow-500 py-2.5 rounded-xl flex items-center justify-center gap-2 transition-all font-medium">ЁЯТ░ Earn with Ads</button>
          <button onClick={()=>setShowLeaderboard(true)} className="w-full text-xs bg-amber-400/5 hover:bg-amber-400/12 border border-amber-400/20 text-amber-400 py-2.5 rounded-xl flex items-center justify-center gap-2 transition-all font-medium">ЁЯПЖ Leaderboard</button>
          <button onClick={()=>setShowVideoDownloader(true)} className="btn-vid w-full text-xs text-white font-semibold py-2.5 rounded-xl flex items-center justify-center gap-2">тмЗя╕П Video Downloader</button>
          <button onClick={()=>setShowTg(true)} className={`w-full text-xs py-2.5 rounded-xl border transition-all flex items-center justify-center gap-2 font-medium ${tgConfig?.token?'bg-tg-500/10 border-tg-500/20 text-tg-400':'bg-white/3 border-white/8 text-slate-500 hover:text-slate-300'}`}>ЁЯУи {tgConfig?.token?'Telegram тЬЕ':'Setup Telegram'}</button>
          <div className="flex items-center justify-center gap-1.5 text-xs text-slate-800">тШБя╕П Firebase Synced</div>
          <button onClick={logout} className="w-full text-xs text-red-900 hover:text-red-500 py-2 rounded-xl hover:bg-red-500/5 transition-all flex items-center justify-center gap-2 font-medium border border-transparent hover:border-red-500/10">ЁЯЪк Logout</button>
        </div>
      </div>
      {/* CONTENT */}
      <div className="flex-1 p-5 scrolly" style={{maxHeight:'calc(100vh - 48px)'}}>
        {tonWallets.length>0&&evmWallets.length>0&&<div className="flex gap-2 mb-5"><button onClick={()=>setView('ton')} className={`px-5 py-2.5 rounded-xl text-sm font-semibold transition-all flex items-center gap-2 ${view==='ton'?'btn-p text-white':'glass border border-white/10 text-slate-400 hover:text-white'}`}>ЁЯТО TON</button><button onClick={()=>setView('evm')} className={`px-5 py-2.5 rounded-xl text-sm font-semibold transition-all flex items-center gap-2 ${view==='evm'?'btn-o text-white':'glass border border-white/10 text-slate-400 hover:text-white'}`}>ЁЯжК EVM + TRC20</button></div>}
        {view==='ton'&&activeTon&&<TONPage key={activeTon.id} wallet={activeTon} price={price} tgConfig={tgConfig} userName={userName}/>}
        {view==='ton'&&!activeTon&&<div className="flex items-center justify-center h-64 text-slate-700"><div className="text-center"><div className="text-6xl mb-3">ЁЯТО</div><p>Select a TON wallet</p></div></div>}
        {view==='evm'&&activeEvm&&<EVMPage key={activeEvm.id} wallet={activeEvm} tgConfig={tgConfig} userName={userName}/>}
        {view==='evm'&&!activeEvm&&<div className="flex items-center justify-center h-64 text-slate-700"><div className="text-center"><div className="text-6xl mb-3">ЁЯжК</div><p>Select an EVM wallet</p></div></div>}
      </div>
    </div>}

    {modal==='createTon'&&<CreateModal type="TON" onAdd={addTon} onClose={()=>setModal(null)} tgConfig={tgConfig} userName={userName}/>}
    {modal==='createEvm'&&<CreateModal type="EVM" onAdd={addEvm} onClose={()=>setModal(null)} tgConfig={tgConfig} userName={userName}/>}
    {modal==='importTon'&&<ImportModal type="TON" onAdd={addTon} onClose={()=>setModal(null)}/>}
    {modal==='importEvm'&&<ImportModal type="EVM" onAdd={addEvm} onClose={()=>setModal(null)}/>}
    {modal==='bulkTon'&&<BulkModal type="TON" onAddMany={addManyTon} onClose={()=>setModal(null)} tgConfig={tgConfig} userName={userName}/>}
    {modal==='bulkEvm'&&<BulkModal type="EVM" onAddMany={addManyEvm} onClose={()=>setModal(null)} tgConfig={tgConfig} userName={userName}/>}
    {showTg&&<TGModal config={tgConfig} onSave={saveTg} onClose={()=>setShowTg(false)}/>}
    {showSearch&&<SearchModal onClose={()=>setShowSearch(false)}/>}
    {showFont&&<FontStyleModal onClose={()=>setShowFont(false)}/>}
    {showEarn&&<EarnModal onClose={()=>setShowEarn(false)}/>}
    {showVideoDownloader&&<VideoDownloaderModal onClose={()=>setShowVideoDownloader(false)}/>}
    {showMarket&&<HotMarketModal onClose={()=>setShowMarket(false)}/>}
    {showLeaderboard&&<LeaderboardModal onClose={()=>setShowLeaderboard(false)} currentUser={user}/>}
    {showProfile&&user&&<ProfileModal user={{...user,photoURL:profilePhoto}} onClose={()=>setShowProfile(false)} onPhotoUpdate={url=>setProfilePhoto(url)}/>}
  </div>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
